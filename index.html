<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老子道德经：四种原文表（网页版）</title>
    <style>


        :root {
            --primary-bg: #fdfaf2; 
            --btn-bg: #e8e2d2; 
            --btn-hover: #e0d8c3;
            --text-main: #665c51; 
            --radius: 8px;
        }


        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--primary-bg);
            margin: 0; padding: 0;
            display: block; 
        }

        #main-layout {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; 
            margin-top: 40px;
        }

        .side-spacer { width: auto; min-width: 20px; }
        .main-column { width: 900px; }

        .controls-cell { padding-bottom: 20px; text-align: center; }
        .controls { display: inline-flex; justify-content: center; align-items: center; gap: 12px; }

        .content-cell {
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border-radius: 4px;
            overflow: hidden;
            min-height: 600px; 
        }

        .footer-cell {
            text-align: center;
            padding-top: 20px; 
            padding-bottom: 20px;
        }

        .action-btn {
            background: transparent; color: #b5ada1; border: 1px solid #e8e2d2;
            padding: 8px 20px; font-size: 13px; border-radius: var(--radius); cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover { border-color: #dcd6c8; color: #665c51; }

        .nav-btn {
            background: var(--btn-bg); color: var(--text-main);
            border: none; width: 44px; height: 36px;
            border-radius: var(--radius); font-size: 18px; cursor: pointer;
            transition: opacity 0.2s;
        }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .menu-container { position: relative; user-select: none; display: inline-block; }
        
        .menu-wrapper {
            height: 36px; min-width: 120px; padding: 0 20px;
            background: var(--btn-bg); border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: opacity 0.2s;
        }
        
        @keyframes breathe {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        
        .menu-wrapper.loading {
            animation: breathe 1s infinite ease-in-out;
            pointer-events: none;
        }

        .menu-label { font-size: 14px; color: var(--text-main); }
        .custom-dropdown {
            position: absolute; top: calc(100% + 8px); left: 50%;
            transform: translateX(-50%); background: #fff;
            border: 1px solid var(--btn-bg); border-radius: var(--radius);
            width: 160px; max-height: 400px; overflow-y: auto; display: none; z-index: 100;
        }
        .custom-dropdown.show { display: block; }
        .dropdown-item { padding: 10px 0; font-size: 14px; text-align: center; cursor: pointer; color: var(--text-main); }
        .dropdown-item:hover { background: var(--primary-bg); }
        .dropdown-item.active { background: var(--btn-bg); font-weight: bold; }

        #content svg { display: block; width: 900px; height: auto; }
        
        .error-msg { padding: 100px 0; color: #b5ada1; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <table id="main-layout">
        <colgroup>
            <col class="side-spacer"> <col class="main-column"> <col class="side-spacer"> </colgroup>

        <tr>
            <td></td>
            <td class="controls-cell">
                <nav class="controls">
                    <button id="prev-btn" class="nav-btn">‹</button>
                    <div class="menu-container">
                        <div class="menu-wrapper" id="menu-trigger">
                            <span id="current-label" class="menu-label">加载中...</span>
                        </div>
                        <div class="custom-dropdown" id="dropdown-list"></div>
                    </div>
                    <button id="next-btn" class="nav-btn">›</button>
                </nav>
            </td>
            <td></td>
        </tr>

        <tr>
            <td></td>
            <td class="content-cell">
                <article id="content"></article>
            </td>
            <td></td>
        </tr>

        <tr>
            <td></td>
            <td class="footer-cell">
<button class="action-btn" id="back-to-top" onclick="smoothScrollToTop()">回到顶部</button>
                
                <div style="font-size: 13px; color: #b5ada1; margin-top: 40px;">
                    网页版内容是图片格式 → 
                    <a href="#" target="_blank" style="color: #b5ada1;; text-decoration: none; border-bottom: 1px solid #dcd6c8;">
                        PDF 版下载页面
                    </a>
                </div>
            </td>
            <td></td>
        </tr>
    </table>

    <script>
        const CONFIG = {
            prefix: "老子道德经：四种原文表-",
            basePath: "工具/svg/",
            totalPage: 86,
            menu: ["封面", "概述", "参考书目", "差异对照", "凡例", "第 1 章"]
        };

        const elements = {
            trigger: document.getElementById('menu-trigger'),
            dropdown: document.getElementById('dropdown-list'),
            label: document.getElementById('current-label'),
            content: document.getElementById('content'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            currentPage: 1
        };

        function init() {
            let itemsHtml = '';
            for (let i = 1; i <= CONFIG.totalPage; i++) {
                let title = (i <= CONFIG.menu.length) ? CONFIG.menu[i - 1] : `第 ${i - (CONFIG.menu.length - 1)} 章`;
                itemsHtml += `<div class="dropdown-item" data-value="${i}">${title}</div>`;
            }
            elements.dropdown.innerHTML = itemsHtml;
            elements.trigger.onclick = (e) => { e.stopPropagation(); elements.dropdown.classList.toggle('show'); };
            elements.dropdown.onclick = (e) => {
                if (e.target.classList.contains('dropdown-item')) {
                    loadPage(parseInt(e.target.dataset.value));
                    elements.dropdown.classList.remove('show');
                }
            };
            document.onclick = () => elements.dropdown.classList.remove('show');
            loadPage(parseInt(window.location.hash.replace('#p', '')) || 1);
        }

        async function loadPage(num) {
            const pageNum = Math.max(1, Math.min(num, CONFIG.totalPage));
            elements.currentPage = pageNum;
            
            elements.trigger.classList.add('loading');
            elements.prevBtn.disabled = true;
            elements.nextBtn.disabled = true;

            try {
                const url = `${CONFIG.basePath}${encodeURIComponent(CONFIG.prefix + pageNum + '.svg')}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error();
                
                const svgText = await resp.text();
                elements.content.innerHTML = svgText;
                
                const svg = elements.content.querySelector('svg');
                if (svg) {
                    svg.setAttribute('width', '900');
                    svg.removeAttribute('height');
                }

                const items = elements.dropdown.querySelectorAll('.dropdown-item');
                items.forEach(item => {
                    const isActive = parseInt(item.dataset.value) === pageNum;
                    item.classList.toggle('active', isActive);
                    if (isActive) elements.label.innerText = item.innerText;
                });
                
                window.history.replaceState(null, null, `#p${pageNum}`);

            } catch (e) {
                elements.content.innerHTML = `<div class="error-msg">载入失败</div>`;
            } finally {
                elements.trigger.classList.remove('loading');
                elements.prevBtn.disabled = pageNum <= 1;
                elements.nextBtn.disabled = pageNum >= CONFIG.totalPage;
            }
        }

        elements.prevBtn.onclick = () => loadPage(elements.currentPage - 1);
        elements.nextBtn.onclick = () => loadPage(elements.currentPage + 1);

        function smoothScrollToTop() {
    const currentX = window.pageXOffset || document.documentElement.scrollLeft;
    
    try {
        window.scrollTo({
            top: 0,
            left: currentX,
            behavior: 'smooth'
        });
    } catch (e) {
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
    }
}

        window.onhashchange = () => {
            const hashPage = parseInt(window.location.hash.replace('#p', ''));
            if(hashPage && hashPage !== elements.currentPage) loadPage(hashPage);
        };
        init();
    </script>
</body>
</html>
