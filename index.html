<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老子道德经：四种原文表（网页版）</title>
<style>

:root {
    --primary-bg: #f5f5f5; 
    --btn-border: #dcdcdc;
    --text-light: #888888;
    --text-main: #4a4a4a;
    --radius: 10px;
}

html {
    scroll-behavior: smooth;
}

body {
    background: var(--primary-bg);
    margin: 0;
    padding: 0;
}

#main-layout {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    margin-top: 40px;
}

.side-spacer {
    width: auto;
    min-width: 20px;
}

.main-column {
    width: 900px;
}

.content-cell {
    background: #fff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    border-radius: 4px;
    overflow: hidden;
    min-height: 600px;
}

.controls-cell {
    padding-bottom: 20px;
    text-align: center;

    user-select: none; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

.footer-cell {
    text-align: center;
    padding: 20px 0;
    
    user-select: none; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

.nav-btn,
.menu-wrapper,
#back-to-top-btn {
    background: transparent;
    color: var(--text-main);
    border: 1.5px solid var(--btn-border); 
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    vertical-align: middle;

    user-select: none; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

.nav-btn {
    width: 56px; 
    height: 48px;
    font-size: 24px; 
}

#back-to-top-btn {
    color: var(--text-light);
    padding: 12px 30px;
    font-size: 15px;
    scroll-margin-top: 9999px;
}


.nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
}

.menu-wrapper {
    height: 48px;
    min-width: 160px; 
    padding: 0 25px;
}

#menu-display {
    font-size: 16px; 
    font-weight: 500;
}

.menu-container {
    position: relative;
    user-select: none;
    display: inline-block;
    margin: 0 20px;
    vertical-align: middle;
}

#menu-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 1px solid var(--btn-border);
    border-radius: var(--radius);
    width: 200px;
    max-height: 400px;
    overflow-y: auto;
    display: none;
    z-index: 100;
}

#menu-dropdown.show {
    display: block;
}

.dropdown-item {
    padding: 10px 0;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    color: var(--text-main);
}

.dropdown-item.active {
    color: var(--text-main);
    font-weight: bold;
}

.dropdown-item:hover {
    background: var(--primary-bg);
}

#content svg {
    display: block;
    width: 900px;
    height: auto;
}

.error-msg {
    padding: 100px 0;
    color: var(--text-light);
    text-align: center;
    font-size: 14px;
}

.download-link {
    color: var(--text-light);
    text-decoration: none;
    border-bottom: 1px dashed var(--text-light);
    padding-bottom: 2px;
    transition: all 0.3s;
}

.download-link:hover {
    color: var(--text-main);
    border-bottom-color: var(--text-light);
}

@keyframes breathe {
    0%, 100% {
        opacity: 1;
    }
    50% {
        opacity: 0.4;
    }
}

.menu-wrapper.loading {
    animation: breathe 1s infinite;
    pointer-events: none;
}

</style>
</head>
<body>
<table id="main-layout">
<colgroup>
    <col class="side-spacer"> <col class="main-column"> <col class="side-spacer"> 
</colgroup>
<tr>
    <td></td>
    <td class="controls-cell">
        <nav class="controls">
            <button id="prev-btn" class="nav-btn">‹</button>
            <div class="menu-container">
                <div class="menu-wrapper" id="menu-trigger">
                    <span id="menu-display">加载图片中...</span>
                </div>
                <div id="menu-dropdown"></div>
            </div>
            <button id="next-btn" class="nav-btn">›</button>
        </nav>
    </td>
    <td></td>
</tr>
<tr>
    <td></td>
    <td class="content-cell">
        <article id="content"></article>
    </td>
    <td></td>
</tr>
<tr>
    <td></td>
    <td class="footer-cell">
        <button id="back-to-top-btn">回到顶部</button>
        <div style="font-size: 13px; color: var(--text-light); margin-top: 40px;">
            网页版的内容是图片格式，PDF 版是文字，可以在<a href="https://tt24h.github.io/" target="_blank" class="download-link">资料导航页</a>下载。
        </div>
    </td>
    <td></td>
</tr>
</table>

<script>
const CONFIG = {
    prefix: "老子道德经：四种原文表-",
    basePath: "工具/svg/",
    totalPage: 86,
    menu: ["封面", "概述", "参考书目", "与参照出版物的原文差异", "凡例", "第 1 章"]
};

const elements = {
    trigger: document.getElementById('menu-trigger'),
    dropdown: document.getElementById('menu-dropdown'),
    label: document.getElementById('menu-display'),
    content: document.getElementById('content'),
    prevBtn: document.getElementById('prev-btn'),
    nextBtn: document.getElementById('next-btn'),
    currentPage: 1
};

function init() {
    let itemsHtml = '';
    for (let i = 1; i <= CONFIG.totalPage; i++) {
        let title = (i <= CONFIG.menu.length) ? CONFIG.menu[i - 1] : `第 ${i - (CONFIG.menu.length - 1)} 章`;
        itemsHtml += `<div class="dropdown-item" data-value="${i}">${title}</div>`;
    }
    elements.dropdown.innerHTML = itemsHtml;
    elements.trigger.onclick = (e) => { e.stopPropagation(); elements.dropdown.classList.toggle('show'); };
    elements.dropdown.onclick = (e) => {
        if (e.target.classList.contains('dropdown-item')) {
            loadPage(parseInt(e.target.dataset.value));
            elements.dropdown.classList.remove('show');
        }
    };
    document.onclick = () => elements.dropdown.classList.remove('show');
    loadPage(parseInt(window.location.hash.replace('#p', '')) || 1);
}

async function loadPage(num) {
    const pageNum = Math.max(1, Math.min(num, CONFIG.totalPage));
    elements.currentPage = pageNum;
    
    elements.trigger.classList.add('loading');
    elements.prevBtn.disabled = true;
    elements.nextBtn.disabled = true;

    try {
        const url = `${CONFIG.basePath}${encodeURIComponent(CONFIG.prefix + pageNum + '.svg')}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        
        const svgText = await resp.text();
        elements.content.innerHTML = svgText;
        
        const svg = elements.content.querySelector('svg');
        if (svg) {
            svg.setAttribute('width', '900');
            svg.removeAttribute('height');
        }

        const items = elements.dropdown.querySelectorAll('.dropdown-item');
        items.forEach(item => {
            const isActive = parseInt(item.dataset.value) === pageNum;
            item.classList.toggle('active', isActive);
            if (isActive) elements.label.innerText = item.innerText;
        });
        
        window.history.replaceState(null, null, `#p${pageNum}`);

    } catch (e) {
        elements.content.innerHTML = `<div class="error-msg">载入失败</div>`;
    } finally {
        elements.trigger.classList.remove('loading');
        elements.prevBtn.disabled = pageNum <= 1;
        elements.nextBtn.disabled = pageNum >= CONFIG.totalPage;
    }
}

elements.prevBtn.onclick = () => loadPage(elements.currentPage - 1);
elements.nextBtn.onclick = () => loadPage(elements.currentPage + 1);

document.getElementById('back-to-top-btn').onclick = function(e) {
    e.preventDefault();
        this.scrollIntoView({
            behavior: 'smooth',
            block: 'start', 
        });
    };
window.onhashchange = () => {
    const hashPage = parseInt(window.location.hash.replace('#p', ''));
    if(hashPage && hashPage !== elements.currentPage) loadPage(hashPage);
};

init();
</script>
</body>
</html>
