<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老子道德经：四种原文表（网页版）</title>
    <style>
        :root {
            --primary-bg: #fdfaf2;
            --bar-bg: #4a4238;
            --accent-color: #e0d8c3;
            --btn-hover: #7c7164;
            --text-main: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Serif CJK SC", serif;
            background: var(--primary-bg);
            margin: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #top-bar {
            background: var(--bar-bg);
            color: var(--accent-color);
            padding: 0 12px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-group, .zoom-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-nav-btn {
            background: #665c51;
            color: var(--accent-color);
            border: none;
            width: 38px;
            height: 34px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .top-nav-btn:hover { background: var(--btn-hover); color: white; }
        .top-nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        select {
            background: var(--accent-color);
            border: none;
            height: 34px;
            padding: 0 8px;
            border-radius: 4px;
            font-size: 15px; 
            width: 6em;
            outline: none;
        }

        .notice-banner {
            position: absolute;
            top: 50px; 
            left: 0;
            right: 0;
            background: rgba(255, 243, 205, 0.95); 
            color: #856404;
            padding: 8px 15px;
            font-size: 13px;
            display: flex; 
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255, 238, 186, 0.5);
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .notice-content {
            flex: 1;
            text-align: center;
        }

        .close-banner-btn {
            background: transparent;
            border: none;
            color: #856404;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .close-banner-btn:hover { opacity: 1; }

        #app {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #eee;
            cursor: grab;
            touch-action: none;
        }

        #app:active { cursor: grabbing; }

        .svg-container {
            position: absolute;
            width: 100%;
            max-width: 1200px;
            transform-origin: 0 0;
        }

        .svg-container svg {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 2000;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 12px;
            pointer-events: none;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #e0d8c3;
            border-top: 3px solid #4a4238;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="top-bar">
        <div class="nav-group">
            <button id="prev-btn" class="top-nav-btn" title="上一页">‹</button>
            <select id="chapter-select"></select>
            <button id="next-btn" class="top-nav-btn" title="下一页">›</button>
        </div>
        <div class="zoom-group">
            <button id="zoom-out" class="top-nav-btn" title="缩小">－</button>
            <button id="zoom-in" class="top-nav-btn" title="放大">＋</button>
        </div>
    </header>

    <div id="notice-banner" class="notice-banner">
        <div class="notice-content">
            ⚠️ 本版内容为图片。<a href="https://tt24h.github.io" target="_blank" style="color:#0056b3; text-decoration:none; font-weight:bold;">PDF 版下载页</a>
        </div>
        <button id="close-notice" class="close-banner-btn" title="关闭提示">×</button>
    </div>

    <main id="app">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <div style="font-size: 14px; color: #666; margin-top:10px;">载入图片中...</div>
        </div>
        <div id="content" class="svg-container"></div>
    </main>

    <script>
        const CONFIG = {
            prefix: "老子道德经：四种原文表-",
            basePath: "工具/svg/",
            totalPage: 86,
            menu: ["封面", "概述", "参考书目", "与参照出版物原文的差异", "凡例", "第 1 章"] 
        };

        let scale = parseFloat(localStorage.getItem('user_scale')) || 1.0;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;
        let velocityX = 0, velocityY = 0;
        let momentumAnimationId = null;

        const elements = {
            select: document.getElementById('chapter-select'),
            content: document.getElementById('content'),
            app: document.getElementById('app'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            loader: document.getElementById('loader'),
            noticeBanner: document.getElementById('notice-banner'),
            closeNotice: document.getElementById('close-notice')
        };

        elements.closeNotice.onclick = () => {
            elements.noticeBanner.style.display = 'none';
        };

        function applyTransform() {
            elements.content.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function updateZoom(newScale) {
            scale = Math.min(Math.max(newScale, 0.4), 4.0);
            localStorage.setItem('user_scale', scale);
            applyTransform();
        }

        function resetPosition() {
            const containerWidth = elements.app.clientWidth;
            const contentWidth = Math.min(containerWidth, 1200) * scale;
            translateX = (containerWidth - contentWidth) / 2;
            translateY = 20;
            applyTransform();
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function applyMomentum() {
            if (momentumAnimationId) cancelAnimationFrame(momentumAnimationId);
            
            if (Math.abs(velocityX) < 0.5 && Math.abs(velocityY) < 0.5) {
                return;
            }
            
            const startVelocityX = velocityX;
            const startVelocityY = velocityY;
            const duration = 500;
            const startTime = Date.now();
            
            const animate = () => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const easeProgress = easeOutCubic(progress);
                velocityX = startVelocityX * (1 - easeProgress);
                velocityY = startVelocityY * (1 - easeProgress);
                
                translateX += velocityX;
                translateY += velocityY;
                
                applyTransform();
                
                if (progress < 1) {
                    momentumAnimationId = requestAnimationFrame(animate);
                } else {
                    velocityX = 0;
                    velocityY = 0;
                }
            };
            
            momentumAnimationId = requestAnimationFrame(animate);
        }

        elements.app.addEventListener('pointerdown', (e) => {
            if (!e.isPrimary) return;
            
            if (momentumAnimationId) {
                cancelAnimationFrame(momentumAnimationId);
                momentumAnimationId = null;
            }
            
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            
            elements.app.setPointerCapture(e.pointerId);
        });

        elements.app.addEventListener('pointermove', (e) => {
            if (!isDragging || !e.isPrimary) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            translateX += deltaX;
            translateY += deltaY;
            
            velocityX = deltaX;
            velocityY = deltaY;
            
            startX = e.clientX;
            startY = e.clientY;
            
            applyTransform();
        });

        elements.app.addEventListener('pointerup', (e) => {
            if (e.isPrimary) {
                isDragging = false;
                applyMomentum();
            }
        });

        elements.app.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
                isDragging = false;
            }
        }, { passive: false });

        elements.app.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        elements.app.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                updateZoom(scale + (e.deltaY < 0 ? 0.1 : -0.1));
            }
        }, { passive: false });

        function init() {
            let options = '';
            const menuLen = CONFIG.menu.length;
            for (let i = 1; i <= CONFIG.totalPage; i++) {
                let title = (i <= menuLen) ? CONFIG.menu[i - 1] : `第 ${i - (menuLen - 1)} 章`;
                options += `<option value="${i}">${title}</option>`;
            }
            elements.select.innerHTML = options;
            
            const hash = parseInt(window.location.hash.replace('#', ''));
            loadPage((hash > 0 && hash <= CONFIG.totalPage) ? hash : 1);
        }

        async function loadPage(num) {
            const pageNum = parseInt(num);
            elements.loader.style.display = 'flex';
            
            try {
                const url = `${CONFIG.basePath}${encodeURIComponent(CONFIG.prefix + pageNum + '.svg')}`;
                const resp = await fetch(url);
                const svgData = await resp.text();

                elements.content.innerHTML = svgData;
                const svg = elements.content.querySelector('svg');
                if (svg) {
                    svg.setAttribute('width', '100%');
                    svg.removeAttribute('height');
                }

                elements.select.value = pageNum;
                elements.prevBtn.disabled = (pageNum <= 1);
                elements.nextBtn.disabled = (pageNum >= CONFIG.totalPage);
                
                window.history.replaceState(null, null, `#${pageNum}`);
                resetPosition();

            } catch (err) {
                elements.content.innerHTML = '<p style="text-align:center; padding-top:50px;">加载失败</p>';
            } finally {
                elements.loader.style.display = 'none';
            }
        }

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        }, false);

        document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
        }, false);

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);


        document.getElementById('zoom-in').onclick = () => updateZoom(scale + 0.2);
        document.getElementById('zoom-out').onclick = () => updateZoom(scale - 0.2);
        elements.select.onchange = (e) => loadPage(e.target.value);
        elements.prevBtn.onclick = () => loadPage(parseInt(elements.select.value) - 1);
        elements.nextBtn.onclick = () => loadPage(parseInt(elements.select.value) + 1);

        window.onhashchange = () => {
            const hash = parseInt(window.location.hash.replace('#', ''));
            if (hash && hash !== parseInt(elements.select.value)) loadPage(hash);
        };

        window.onresize = resetPosition;
        init();
    </script>
</body>
</html>
